<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <!-- soft pastel background (peach) -->
  <rect width="60" height="60" fill="#ffe5d9" />
  <!-- faint mint diagonal stripes -->
  <g stroke="#d0f0c0" stroke-width="6">
    <line x1="0" y1="0" x2="60" y2="60" />
    <line x1="0" y1="20" x2="40" y2="60" />
    <line x1="20" y1="0" x2="60" y2="40" />
  </g>
</svg>